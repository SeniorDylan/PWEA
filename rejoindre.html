<!DOCTYPE html>
<html lang="fr">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Rejoindre la PWEA</title>
  <link rel="stylesheet" href="style.css">
</head>

<body>

<header class="header">
  <div class="nav">
    <a href="index.html" style="display: flex; align-items: center; gap: 15px; text-decoration: none; color: inherit;">
      <img src="images/logo.jpg" class="logo" alt="Logo PWEA">
      <h1>PHARMACEUTICAL WASTE ELIMINATION MANAGEMENT</h1>
    </a>
  </div>
</header>

<section class="form-section fade show">
  <div style="text-align: center; margin-bottom: 30px;">
    <h2>Rejoignez notre communauté</h2>
    <p style="opacity: 0.8;">Remplissez ce formulaire pour vous inscrire.</p>
  </div>

  <form id="form" action="https://formspree.io/f/VOTRE_ID_FORMSPREE" method="POST">
    <h3>Informations personnelles</h3>
    <input type="text" name="nom" placeholder="Nom complet" required>
    <input type="text" name="prenom" placeholder="Prénom" required>
    <input type="date" name="date_naissance">
    <input type="email" name="email" placeholder="Email" required>
    <input type="text" name="telephone" placeholder="Téléphone">

    <h3>Localisation</h3>
    <input type="text" name="ville" placeholder="Ville" required>
    <input type="text" name="pays" placeholder="Pays" required>

    <h3>Participation</h3>
    <label><input type="checkbox" name="participation" value="Benevolat"> Bénévolat</label>
    <label><input type="checkbox" name="participation" value="Campagnes"> Campagnes</label>
    <label><input type="checkbox" name="participation" value="Evenements"> Événements</label>
    <label><input type="checkbox" name="participation" value="Creation contenu"> Création contenu</label>

    <h3>Disponibilité</h3>
    <select name="disponibilite">
      <option value="Quelques heures/mois">Quelques heures / mois</option>
      <option value="1 journee/mois">1 journée / mois</option>
      <option value="Plus d'une journee">Plus d’une journée</option>
    </select>

    <textarea name="motivation" placeholder="Motivation"></textarea>

    <label style="display: flex; align-items: center; gap: 10px;">
      <input type="checkbox" required>
      J’accepte l’utilisation de mes données
    </label>

    <button type="submit">S'inscrire</button>
  </form>
  
  <div style="text-align: center; margin-top: 20px;">
    <a href="index.html" style="color: #06b6d4; text-decoration: none;">← Retour à l'accueil</a>
  </div>
</section>

<footer>
  © 2026 PWEA
</footer>

<script src="script.js"></script>
</body>
</html>
